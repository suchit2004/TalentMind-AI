ai_usage_summary: |
  Used Gemini for architecture discussions and code review. No candidate data was fed to any external LLMs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A two-phase lexical-semantic ranking pipeline. Offline, we pre-generate dense embeddings using all-MiniLM-L6-v2, construct a BM25 index, and precompute Company DNA & Skill Trust matrices. Online, we apply 5 hard chronological honeypot rules, retrieve the top 800 candidates via hybrid lexical-semantic filtering, score them using a clipped multi-factor weight system, and sort them using a 7-level deterministic tie-breaker. Fully CPU-bound and completes in under 15 seconds.

